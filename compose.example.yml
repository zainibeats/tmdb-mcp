services:
  ollama:
    image: ollama/ollama:latest
    container_name: tmdb-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    restart: unless-stopped

  open-webui:
    image: ghcr.io/open-webui/open-webui:latest
    container_name: tmdb-open-webui
    depends_on:
      - ollama
      - tmdb-mcpo
    ports:
      - "3000:8080"
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
    volumes:
      - open-webui:/app/backend/data
    restart: unless-stopped

  tmdb-mcpo:
    build:
      context: .
      dockerfile: Dockerfile.mcpo
    image: tmdb-mcp-mcpo:latest
    container_name: tmdb-mcpo
    ports:
      - "8000:8000"
    environment:
      TMDB_API_KEY: ${TMDB_API_KEY:?Set TMDB_API_KEY in your shell or .env file}
    restart: unless-stopped

volumes:
  ollama:
  open-webui:
