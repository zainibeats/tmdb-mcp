name: tmdb-embed-resolver
title: TMDB Embed Resolver
type: server
image: zainibeats/tmdb-embed-resolver:latest
description: Generates provider URLs and a local UI link from a confirmed TMDB movie or TV ID.
env:
  - name: TMDB_EMBED_UI_BASE_URL
    value: http://localhost:8689
tools:
  - name: list_embed_providers
  - name: generate_embed_urls_for_tmdb
metadata:
  category: integration
  tags:
    - movies
    - tv
    - entertainment
    - tmdb
  license: MIT
  owner: zainibeats
