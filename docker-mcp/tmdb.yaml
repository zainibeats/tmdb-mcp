name: tmdb
title: TMDB
type: server
image: skimming124/tmdb-mcp:latest
description: Read-only TMDB discovery tools for movie and TV recommendations.
secrets:
  - name: TMDB_API_KEY
    env: TMDB_API_KEY
    example: tmdb_api_key_here
tools:
  - name: find_media
  - name: discover_media
  - name: get_media_details
  - name: get_similar_media
  - name: get_trending_media
  - name: get_popular_media
  - name: get_top_rated_media
  - name: get_genres
  - name: get_movie_credits
metadata:
  category: integration
  tags:
    - movies
    - tv
    - entertainment
    - tmdb
  license: MIT
  owner: skimming124
